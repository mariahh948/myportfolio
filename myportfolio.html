<!DOCTYPE html>
<html lang="en">
    <head>
	<title>Hello there!</title>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<style>
        html, body {
            height: 100%;
        }
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        * {
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
        }

        .topnav {
            overflow: hidden;
            background-color: #333;
        }

        .topnav a {
            float: left;
            display: block;
            color: #f2f2f2;
            text-align: center;
            padding: 14px 16px;
            text-decoration: none;
        }

        .topnav a:hover {
            background-color: #ddd;
            color: black;
        }

        .content {
            background-color: #ddd;
            padding: 10px;
            text-align: center;
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 700px;
        }

        .footer {
            background-color: #f1f1f1;
            padding: 10px;
            text-align: center;
        }
	</style>
    </head>

    <body>
        <!--<canvas id="content" width="200" height="100" style="border:1px solid #d3d3d3;">
            Your browser does not support the HTML canvas tag.
        </canvas>-->
        <div class="topnav">
            <a href="#">Home</a>
            <a href="#">About Me</a>
            <a href="#">Projects</a>
            <a href="#">Resume</a>
            <a href="#">Contact</a>
        </div>

        <div class="content">
            <canvas id="contents" width="400" height="500">
                <div>
                    <h3>Hello There!</h3>
                    <h1>I am Mariah Smith.</h1>
                </div>

            <!--<h3>Hello There!</h3>
            <h1>I am Mariah Smith.</h1>-->
            </canvas>
            <!--<h3>Hello There!</h3>
            <h1>I am Mariah Smith.</h1>-->
        </div>


        <div class="footer">
            <p>Welcome to my portfolio.</p>
        </div>

        <script>
            var c = document.getElementById("contents");
            var ctx = c.getContext("2d");

            var grd = ctx.createRadialGradient(c.width/2, c.height/2, 20, c.width/2, c.height/2, 300);
            grd.addColorStop(0, "rgba(255,182,193,1)");
            grd.addColorStop(1, "rgba(255,182,193,0)");

            ctx.fillStyle = grd;
            ctx.fillRect(0, 0, c.width, c.height);

            ctx.font = "30px Arial";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.strokeText("Hello There!", c.width/2, 230);
        </script>

    </body>
</html>
