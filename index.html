<!DOCTYPE html>
<html lang="en">
    <head>
	<title>Hello there!</title>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<style>
        html, body {
            height: 100%;
        }
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        * {
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
        }

        .topnav {
            overflow: hidden;
            background-color: #1f1f1f;
        }
        .topnav a {
            float: left;
            display: block;
            color: antiquewhite;
            text-align: center;
            padding: 14px 16px;
            text-decoration: none;
        }

        .topnav a:hover {
            background-color: antiquewhite;
            color: black;
        }

        .topnav a.active {
            background-color: antiquewhite;
        }

        .content {
            background-color: #2b2b2b;
            padding: 10px;
            text-align: center;
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 700px;
            position: relative;
        }
        .hero-text {
            position: absolute;

            top: 45%;
            left: 50%;

            transform: translate(-50%, -50%);

            font-size: 30px;
            color: black;
        }

        .footer {
            background-color: #1f1f1f;
            padding: 10px;
            text-align: center;
            color: antiquewhite;
        }
	</style>
    </head>

    <body>
        <!--<canvas id="content" width="200" height="100" style="border:1px solid #d3d3d3;">
            Your browser does not support the HTML canvas tag.
        </canvas>-->
        <div class="topnav">
            <a href="#" class="acive">Home</a>
            <a href="aboutme.html">About Me</a>
            <a href="projects.html">Projects</a>
            <a href="skills.html">Skills</a>
            <a href="contact.html">Contact</a>
        </div>

        <div class="content">
            <canvas id="contents" width="400" height="500"></canvas>
            
            <div class="hero-text">
                <span id="typing"></span>
            </div>

            <!--<h3>Hello There!</h3>
            <h1>I am Mariah Smith.</h1>-->
            <!--<h3>Hello There!</h3>
            <h1>I am Mariah Smith.</h1>-->
        </div>

        <div class="footer">
            <p>Welcome to my portfolio.</p>
        </div>

        <script src="https://unpkg.com/typed.js@3.0.0/dist/typed.umd.js"></script>

        <script>
            var typed = new Typed("#typing", {
                strings: ["Hello there!", "I am Mariah Smith.", "Welcome to my portfolio!"],
                typeSpeed: 75,
                backSpeed: 40,
                loop: true
            });
        </script>

        <script>
            var c = document.getElementById("contents");
            var ctx = c.getContext("2d");

            var grd = ctx.createRadialGradient(c.width/2, c.height/2, 20, c.width/2, c.height/2, 300);
            grd.addColorStop(0, "rgba(255,182,193,1)");
            grd.addColorStop(1, "rgba(255,182,193,0)");

            ctx.fillStyle = grd;
            ctx.fillRect(0, 0, c.width, c.height);

            //ctx.font = "30px Arial";
            //ctx.textAlign = "center";
            //ctx.textBaseline = "middle";
            //ctx.strokeText("Hello There!", c.width/2, 230);
        </script>

    </body>
